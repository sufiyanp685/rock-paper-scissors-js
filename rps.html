<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK-PAPER-SCISSORS</title>
    <link rel="stylesheet" href="rps.css">
</head>
<body>
    <main>
        <h1>Rock Paper Scissors</h1>
        <div class="choices">
            <div class="choice" id="rock"><img src="images/rock.png"  class="img"alt="rock"> </div>
        
        <div  class="choice" id="paper"><img src="images/paper.png" class="img" alt="paper"></div>
        <div class="choice" id="scissors"><img src="images/scissors.png" class="img" alt="scissors">
        </div>
        </div>

        <div class="scoreboard">
            <div class="score"   >
                <p id="userscore">0</p>
                <p><b>You</b></p>
            </div>
            <div class="score">
                <p id="compscore">0</p>
                <p><b>Comp</b></p>
            </div>
              
        </div>
        <div class="msg-container">
            <p id="msg">Pick your move</p>
        </div>



    </main>
    <script src="rps.js"></script>
</body>
</html>
